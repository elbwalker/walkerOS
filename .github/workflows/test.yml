name: Build and test

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '**/*.mdx'
      - 'docs/**'
      - 'website/**'
      - '.github/workflows/website.yml'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'website/**'
      - '.github/workflows/website.yml'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_and_test:
    name: Build and test
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.15.0'
          cache: 'npm'
      - name: Cache node_modules
        id: node_modules_cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/**/node_modules
            apps/*/node_modules
          key: nm-${{ runner.os }}-node24.15.0-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.node_modules_cache.outputs.cache-hit != 'true'
        run: npm ci
      # Drift gate: the committed CLI api.gen.d.ts (and spec.json) must equal a
      # fresh, prettier-formatted generate:types run. Prevents stale/unformatted
      # generated API types from being committed (the recurring eternal-diff).
      - name: Verify CLI API types are in sync
        run: |
          npm --prefix packages/cli run generate:types
          git diff --exit-code packages/cli/openapi/spec.json packages/cli/src/types/api.gen.d.ts \
          || (echo "::error ::CLI generated API types are stale. Run 'cd packages/cli && npm run generate:types' and commit the result." && exit 1)
      - name: Validate documentation
        run: npm run validate:links
      - name: Verify (PR, affected only)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main --depth=1
          npx turbo run typecheck lint test test:integration --filter='[origin/main]'
      - name: Verify (push to main or manual, full)
        if: github.event_name != 'pull_request'
        run: npx turbo run typecheck lint test test:integration
      - name: Run e2e tests
        if: github.event_name != 'pull_request'
        run: npm run test:e2e
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ github.run_id }}
          path: |
            packages/*/coverage/
            packages/*/.tmp/
          retention-days: 7
