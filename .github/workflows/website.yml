name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/website.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'website/**'
      - '.github/workflows/website.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.15.0'
          cache: 'npm'
      - run: npm ci

      - name: Build website (production)
        if: github.event_name != 'pull_request'
        run: npm run build:website

      - name: Build website (PR preview)
        if: github.event_name == 'pull_request'
        run: npm run build:website
        env:
          DOCUSAURUS_BASEURL: /preview/pr-${{ github.event.pull_request.number }}/

      - name: Validate docs and LLM export
        run: npm run validate

      - name: Deploy to production
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        working-directory: website
        run: node scripts/deploy-bunny.mjs
        env:
          BUNNY_STORAGE_ZONE: ${{ secrets.BUNNY_WEBSITE_STORAGE_ZONE }}
          BUNNY_STORAGE_PASSWORD: ${{ secrets.BUNNY_WEBSITE_STORAGE_PASSWORD }}
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          BUNNY_PULLZONE_URL: ${{ secrets.BUNNY_WEBSITE_PULLZONE_URL }}

      - name: Deploy PR preview
        if: github.event_name == 'pull_request'
        working-directory: website
        run: node scripts/deploy-bunny.mjs
        env:
          BUNNY_STORAGE_ZONE: ${{ secrets.BUNNY_WEBSITE_STORAGE_ZONE }}
          BUNNY_STORAGE_PASSWORD: ${{ secrets.BUNNY_WEBSITE_STORAGE_PASSWORD }}
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          BUNNY_PULLZONE_URL: ${{ secrets.BUNNY_WEBSITE_PULLZONE_URL }}
          DEPLOY_PATH: preview/pr-${{ github.event.pull_request.number }}

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BUNNY_PULLZONE_URL: ${{ secrets.BUNNY_WEBSITE_PULLZONE_URL }}
          PR_NUM: ${{ github.event.pull_request.number }}
        with:
          script: |
            const previewUrl = `${process.env.BUNNY_PULLZONE_URL}/preview/pr-${process.env.PR_NUM}/`;
            const body = `### Preview deployed\n\n${previewUrl}`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('### Preview deployed'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Delete preview folder
        run: |
          curl -X DELETE \
            "https://storage.bunnycdn.com/${BUNNY_STORAGE_ZONE}/preview/pr-${PR_NUMBER}/" \
            -H "AccessKey: ${BUNNY_STORAGE_PASSWORD}"
          echo "Deleted preview/pr-${PR_NUMBER}/"
        env:
          BUNNY_STORAGE_ZONE: ${{ secrets.BUNNY_WEBSITE_STORAGE_ZONE }}
          BUNNY_STORAGE_PASSWORD: ${{ secrets.BUNNY_WEBSITE_STORAGE_PASSWORD }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Purge preview cache
        run: |
          curl -X POST \
            "https://api.bunny.net/purge?url=$(echo "${BUNNY_PULLZONE_URL}/preview/pr-${PR_NUMBER}/*" | jq -sRr @uri)" \
            -H "AccessKey: ${BUNNY_API_KEY}"
          echo "Cache purged"
        env:
          BUNNY_PULLZONE_URL: ${{ secrets.BUNNY_WEBSITE_PULLZONE_URL }}
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
